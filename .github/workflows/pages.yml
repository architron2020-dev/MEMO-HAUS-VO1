name: Deploy presentation to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/public/presentation/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Upload presentation as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/public/presentation
      - id: deployment
        uses: actions/deploy-pages@v4
