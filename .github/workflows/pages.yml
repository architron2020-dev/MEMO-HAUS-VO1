name: Deploy Memo-Haus app to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build the web app
        run: npm run build
        env:
          # Base path for the project Pages site. Change if you move to a root
          # domain (set to "/").
          MEMO_WEB_BASE: /MEMO-HAUS-VO1/
          # The Pages copy is a different origin than the backend, so it must
          # call the real ki-pc backend absolutely (which sends CORS *). The
          # ki-pc build itself leaves this unset and stays same-origin. Override
          # with a repo variable MEMO_API_BASE if the backend host changes.
          VITE_MEMO_API_BASE: ${{ vars.MEMO_API_BASE || 'https://ki-pc.architektur.uni-weimar.de' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
