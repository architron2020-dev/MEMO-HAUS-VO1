<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Memo-Haus — Browse Memories</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function () {
        var saved = localStorage.getItem("memo-theme");
        var theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.dataset.theme = theme;

        var palette = [[31,46,110], [0,122,61], [242,169,0], [212,42,28], [15,76,129], [255,111,97], [95,75,139], [136,176,75], [187,38,73], [255,159,124], [102,103,171], [149,82,81], [0,128,128], [212,160,23], [233,30,99], [180,160,220], [204,85,0], [34,87,59]];
        var rgb = palette[Math.floor(Math.random() * palette.length)];
        var soft = rgb.map(function (c) { return Math.round(c + (255 - c) * 0.62); });
        document.documentElement.style.setProperty("--accent-pick", rgb.join(","));
        document.documentElement.style.setProperty("--accent-pick-soft", soft.join(","));
        window.__memoAccentRgb = rgb;

        var iconLink = document.querySelector('link[rel="icon"]');
        if (iconLink) {
          var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">'
            + '<circle cx="16" cy="16" r="15" fill="rgb(' + rgb.join(",") + ')"/>'
            + '<circle cx="16" cy="16" r="5" fill="#06080c"/></svg>';
          iconLink.href = "data:image/svg+xml," + encodeURIComponent(svg);
        }
      })();
    </script>
  </head>
  <body class="upload-body">
    <label class="theme-switch" aria-label="Toggle light/dark mode">
      <input type="checkbox" id="theme-switch-input" />
      <span class="theme-switch-track"><span class="theme-switch-knob"></span></span>
    </label>
    <button class="page-back" id="page-back" type="button" aria-label="Back">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M19 12H5M5 12L11 6M5 12L11 18" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <main class="upload-card">
      <header class="upload-header">
        <svg class="upload-logo" viewBox="0 0 200 108" role="img" aria-label="Memo-Haus">
          <g transform="translate(100,32)">
            <ellipse rx="26" ry="11" fill="none" style="stroke: rgb(var(--hc))" stroke-width="1.6" transform="rotate(-18)"/>
            <circle r="18" fill="none" style="stroke: rgb(var(--hc))" stroke-width="1.6"/>
            <g class="splash-orbit">
              <line x1="-18" y1="0" x2="-24" y2="0" style="stroke: rgb(var(--hc))" stroke-width="1.8"/>
              <line x1="18" y1="0" x2="24" y2="0" style="stroke: rgb(var(--hc))" stroke-width="1.8"/>
            </g>
            <circle r="3.5" style="fill: rgb(var(--hc))"/>
            <circle r="1.4" cx="-0.7" cy="-0.7" style="fill: var(--page-bg)"/>
          </g>
          <g text-anchor="middle">
            <text x="100" y="74" font-size="24" font-weight="800" letter-spacing="6" style="fill: rgb(var(--hc))">MEMO</text>
            <text x="100" y="100" font-size="24" font-weight="800" letter-spacing="6" style="fill: rgb(var(--hc))">HAUS</text>
          </g>
        </svg>
        <p class="caption-tagline">Browse The Archive</p>
        <p>Pick a memory below and it will appear on the viewer right now.</p>
        <p class="terminal-line">LOADING MEMORIES <span class="blink-cursor">█</span></p>
      </header>

      <!-- Stitched / collective scenes — kept clearly separate so they're
           never buried under however many individual photos exist -->
      <section id="stitched-section">
        <p class="stitched-heading">⬡ Collective Memories (Stitched)</p>
        <p id="stitched-status" class="gap-status"></p>
        <div id="stitched-list" class="memories-list"></div>
      </section>

      <section id="individual-section">
        <p class="individual-heading">Individual Memories</p>
        <p id="memories-status" class="gap-status"></p>
        <div id="memories-list" class="memories-list"></div>
      </section>

      <footer class="upload-footer">
        <a href="/index.html" class="footer-pill">New Memory</a>
        <a href="/viewer.html" target="_blank" rel="noopener" class="footer-pill">Live Viewer</a>
      </footer>
    </main>

    <div id="cursor-reticle" class="cursor-reticle">
      <span class="cursor-ring"></span>
      <span class="cursor-dot"></span>
    </div>

    <script type="module" src="/src/memories.js"></script>
  </body>
</html>
