<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Memo-Haus — Live Viewer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function () {
        var palettes = [
          { a:'rgba(28,118,224,0.82)', b:'rgba(224,178,120,0.72)', c:'rgba(48,155,238,0.58)', d:'rgba(195,148,88,0.48)', icon:[28,118,224] },
          { a:'rgba(68,138,95,0.82)',  b:'rgba(48,98,168,0.76)',   c:'rgba(138,112,58,0.62)', d:'rgba(52,128,112,0.56)', icon:[68,138,95] },
          { a:'rgba(198,138,58,0.82)', b:'rgba(38,128,138,0.76)',  c:'rgba(228,168,78,0.62)', d:'rgba(48,118,128,0.52)', icon:[198,138,58] },
          { a:'rgba(138,98,198,0.80)', b:'rgba(208,128,158,0.74)', c:'rgba(158,118,218,0.58)', d:'rgba(188,108,138,0.48)', icon:[138,98,198] },
          { a:'rgba(38,98,168,0.84)',  b:'rgba(218,118,98,0.76)',  c:'rgba(58,128,188,0.60)', d:'rgba(198,138,118,0.50)', icon:[38,98,168] },
          { a:'rgba(42,108,68,0.84)',  b:'rgba(198,162,58,0.76)',  c:'rgba(58,138,82,0.60)', d:'rgba(178,138,48,0.50)', icon:[42,108,68] },
        ];
        var p = palettes[Math.floor(Math.random() * palettes.length)];
        var root = document.documentElement;
        root.style.setProperty('--orb-a', p.a);
        root.style.setProperty('--orb-b', p.b);
        root.style.setProperty('--orb-c', p.c);
        root.style.setProperty('--orb-d', p.d);
        var soft = p.icon.map(function(c){ return Math.round(c+(255-c)*0.62); });
        root.style.setProperty('--accent-pick', p.icon.join(','));
        root.style.setProperty('--accent-pick-soft', soft.join(','));
        window.__memoFluidColors = [p.a, p.b, p.c, p.d];

        var iconLink = document.querySelector('link[rel="icon"]');
        if (iconLink) {
          var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">'
            + '<circle cx="16" cy="16" r="15" fill="rgb(' + p.icon.join(',') + ')"/>'
            + '<circle cx="16" cy="16" r="5" fill="#ede8de"/></svg>';
          iconLink.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
        }
      })();
    </script>
  </head>
  <body>
    <div id="viewer"></div>

    <!-- Cinematic vignette -->
    <div id="vignette"></div>

    <div id="transition-overlay"></div>

    <div id="placeholder">
      <div id="splash-fluid">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
        <div class="orb orb-d"></div>
        <div class="orb orb-e"></div>
        <div class="orb orb-f"></div>
      </div>
      <div class="placeholder-inner">
        <!-- Logo -->
        <svg class="placeholder-logo" viewBox="0 0 200 108" role="img" aria-label="Memo-Haus">
          <g transform="translate(100,32)">
            <ellipse rx="26" ry="11" fill="none" stroke="rgba(255,255,255,0.70)" stroke-width="1.6" transform="rotate(-18)"/>
            <circle r="18" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="1.6"/>
            <g class="splash-orbit">
              <line x1="-18" y1="0" x2="-24" y2="0" stroke="rgba(255,255,255,0.50)" stroke-width="1.8"/>
              <line x1="18" y1="0" x2="24" y2="0" stroke="rgba(255,255,255,0.50)" stroke-width="1.8"/>
            </g>
            <circle r="3.5" fill="rgba(255,255,255,0.90)"/>
            <circle r="1.4" cx="-0.7" cy="-0.7" fill="rgba(0,0,0,0.25)"/>
          </g>
          <g text-anchor="middle">
            <text x="100" y="74" font-size="24" font-weight="800" letter-spacing="6" fill="rgba(255,255,255,0.95)">MEMO</text>
            <text x="100" y="100" font-size="24" font-weight="800" letter-spacing="6" fill="rgba(255,255,255,0.95)">HAUS</text>
          </g>
        </svg>

        <!-- Spinner ring — same ring+dot loader as the app's preserve screen -->
        <div class="splash-spinner-wrap">
          <div class="splash-spinner"><span class="splash-spinner-dot"></span></div>
        </div>
        <p class="splash-percent" id="splash-percent"></p>

        <!-- Status text — updated by JS as scenes load -->
        <p class="placeholder-sub" id="splash-status">entering the memory verse…</p>
        <p class="placeholder-loading" id="splash-count"></p>
      </div>
    </div>

    <!-- Cinematic story overlay — center-bottom of scene -->
    <div id="story-overlay" class="hidden">
      <p id="overlay-story-text"></p>
    </div>

    <!-- Bottom-left sci-fi HUD: timer ring + memory readout -->
    <div id="scene-hud" class="scene-hud hidden">
      <div class="hud-ring">
        <svg width="44" height="44" viewBox="0 0 44 44" class="hud-ring-svg">
          <circle class="timer-track"    cx="22" cy="22" r="16"/>
          <circle class="timer-progress" cx="22" cy="22" r="16" id="timer-arc"/>
          <circle class="ring-pulse" cx="22" cy="22" r="3.4"/>
        </svg>
      </div>
      <div class="hud-info">
        <div class="hud-status" id="hud-status"></div>
        <div class="hud-row">
          <span class="hud-label">NAME</span>
          <span id="caption-name" class="hud-value"></span>
        </div>
        <div class="hud-row" id="author-row">
          <span class="hud-label">BY</span>
          <span id="caption-author" class="hud-value hud-dim"></span>
        </div>
        <div class="hud-row" id="year-row">
          <span class="hud-label">YEAR</span>
          <span id="caption-year" class="hud-value hud-year"></span>
        </div>
        <div class="hud-row" id="cluster-row">
          <span class="hud-label">ERA</span>
          <span id="caption-cluster" class="hud-value hud-dim"></span>
        </div>
        <div class="hud-row" id="story-row">
          <span class="hud-label">MEMO</span>
          <span id="caption-story" class="hud-value hud-story"></span>
        </div>

      </div>
    </div>

    <!-- Bottom-right: processing pill -->
    <div id="processing-loader" class="processing-loader hidden">
      <div class="processing-dot"></div>
      <span>Generating memory…</span>
    </div>

    <!-- Error dot -->
    <div id="connection" class="connection"></div>

    <!-- Per-scene voice note / music clip — src set and played in showHud() -->
    <audio id="scene-audio" loop preload="auto"></audio>

    <!-- Custom reticle cursor — native cursor stays hidden (kiosk look), this
         follows the pointer instead so it's always clear where a click lands -->
    <div id="cursor-reticle" class="cursor-reticle">
      <span class="cursor-ring"></span>
      <span class="cursor-dot"></span>
    </div>

    <!-- Reset button and instructions removed; nav controlled via mobile app -->

    <!-- Debug / utility controls -->
    <div id="debug-controls" class="debug-controls">
      <button id="btn-boxes" class="debug-btn" type="button" title="Show memory boundary boxes" aria-pressed="false">▢</button>
      <button id="btn-music" class="debug-btn active" type="button" title="Toggle music" aria-pressed="true">♪</button>
      <button id="btn-slideshow" class="debug-btn" type="button" title="Toggle slideshow (auto-advance between memories)" aria-pressed="false">▶</button>
      <button id="btn-fullscreen" class="debug-btn" type="button" title="Toggle fullscreen" aria-pressed="false">⛶</button>
      <button id="btn-render-mode" class="debug-btn" type="button" title="Toggle splat / point-cloud rendering" aria-pressed="false">SPLAT</button>
    </div>

    <script type="module" src="/src/viewer.js"></script>
  </body>
</html>
