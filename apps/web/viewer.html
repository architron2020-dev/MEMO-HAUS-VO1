<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memo-Haus — Live Viewer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function () {
        // If this tab was opened from a mobile page's "Live Viewer" link,
        // ?accent=r,g,b carries that tab's randomly-picked colour along —
        // this tab's icon matches where you came from instead of picking
        // its own. Opened directly (no link), it picks its own — same
        // palette, same logic, fully parallel to the mobile app's starting
        // screen. Either way, this only governs the screen BEFORE a scene
        // loads — applyHudColor() takes over --hc once a real scene's own
        // colour is extracted.
        var params = new URLSearchParams(window.location.search);
        var fromLink = params.get("accent");
        var rgb;
        if (fromLink && /^\d{1,3},\d{1,3},\d{1,3}$/.test(fromLink)) {
          rgb = fromLink.split(",").map(Number);
        } else {
          var palette = [[31,46,110], [0,122,61], [242,169,0], [212,42,28], [15,76,129], [255,111,97], [95,75,139], [136,176,75], [187,38,73], [255,159,124], [102,103,171], [149,82,81], [0,128,128], [212,160,23], [233,30,99], [180,160,220], [204,85,0], [34,87,59]];
          rgb = palette[Math.floor(Math.random() * palette.length)];
        }
        var soft = rgb.map(function (c) { return Math.round(c + (255 - c) * 0.62); });
        document.documentElement.style.setProperty("--accent-pick", rgb.join(","));
        document.documentElement.style.setProperty("--accent-pick-soft", soft.join(","));

        var iconLink = document.querySelector('link[rel="icon"]');
        if (iconLink) {
          var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">'
            + '<circle cx="16" cy="16" r="15" fill="rgb(' + rgb.join(",") + ')"/>'
            + '<circle cx="16" cy="16" r="5" fill="#06080c"/></svg>';
          iconLink.href = "data:image/svg+xml," + encodeURIComponent(svg);
        }
      })();
    </script>
  </head>
  <body>
    <div id="viewer"></div>

    <!-- Cinematic vignette -->
    <div id="vignette"></div>

    <div id="transition-overlay"></div>

    <div id="placeholder">
      <div class="placeholder-inner">
        <svg class="placeholder-logo" viewBox="0 0 200 108" role="img" aria-label="Memo-Haus">
          <g transform="translate(100,32)">
            <ellipse rx="26" ry="11" fill="none" style="stroke: rgb(var(--hc))" stroke-width="1.6" transform="rotate(-18)"/>
            <circle r="18" fill="none" style="stroke: rgb(var(--hc))" stroke-width="1.6"/>
            <g class="splash-orbit">
              <line x1="-18" y1="0" x2="-24" y2="0" style="stroke: rgb(var(--hc))" stroke-width="1.8"/>
              <line x1="18" y1="0" x2="24" y2="0" style="stroke: rgb(var(--hc))" stroke-width="1.8"/>
            </g>
            <circle r="3.5" style="fill: rgb(var(--hc))"/>
            <circle r="1.4" cx="-0.7" cy="-0.7" style="fill: var(--page-bg)"/>
          </g>
          <g text-anchor="middle">
            <text x="100" y="74" font-size="24" font-weight="800" letter-spacing="6" style="fill: rgb(var(--hc))">MEMO</text>
            <text x="100" y="100" font-size="24" font-weight="800" letter-spacing="6" style="fill: rgb(var(--hc))">HAUS</text>
          </g>
        </svg>
        <p class="placeholder-sub">From Archive To Participatory Experience</p>
        <button type="button" id="splash-start-btn" class="splash-start-btn">Step Into Memory</button>
      </div>
    </div>

    <!-- Cinematic story overlay — center-bottom of scene -->
    <div id="story-overlay" class="hidden">
      <p id="overlay-story-text"></p>
    </div>

    <!-- Bottom-left sci-fi HUD: timer ring + memory readout -->
    <div id="scene-hud" class="scene-hud hidden">
      <div class="hud-ring">
        <svg width="44" height="44" viewBox="0 0 44 44" class="hud-ring-svg">
          <circle class="timer-track"    cx="22" cy="22" r="16"/>
          <circle class="timer-progress" cx="22" cy="22" r="16" id="timer-arc"/>
          <circle class="ring-pulse" cx="22" cy="22" r="3.4"/>
        </svg>
      </div>
      <div class="hud-info">
        <div class="hud-status" id="hud-status"></div>
        <div class="hud-row">
          <span class="hud-label">NAME</span>
          <span id="caption-name" class="hud-value"></span>
        </div>
        <div class="hud-row" id="author-row">
          <span class="hud-label">BY</span>
          <span id="caption-author" class="hud-value hud-dim"></span>
        </div>
        <div class="hud-row" id="year-row">
          <span class="hud-label">YEAR</span>
          <span id="caption-year" class="hud-value hud-year"></span>
        </div>
        <div class="hud-row" id="cluster-row">
          <span class="hud-label">ERA</span>
          <span id="caption-cluster" class="hud-value hud-dim"></span>
        </div>
        <div class="hud-row" id="story-row">
          <span class="hud-label">MEMO</span>
          <span id="caption-story" class="hud-value hud-story"></span>
        </div>

      </div>
    </div>

    <!-- Bottom-right: processing pill -->
    <div id="processing-loader" class="processing-loader hidden">
      <div class="processing-dot"></div>
      <span>Generating memory…</span>
    </div>

    <!-- Error dot -->
    <div id="connection" class="connection"></div>

    <!-- Per-scene voice note / music clip — src set and played in showHud() -->
    <audio id="scene-audio" loop preload="auto"></audio>

    <!-- Custom reticle cursor — native cursor stays hidden (kiosk look), this
         follows the pointer instead so it's always clear where a click lands -->
    <div id="cursor-reticle" class="cursor-reticle">
      <span class="cursor-ring"></span>
      <span class="cursor-dot"></span>
    </div>

    <!-- World of Memories — loads every scene at once, spread apart in 3D
         space, for free exploration instead of the one-at-a-time rotation -->
    <button type="button" id="world-mode-btn" class="world-mode-btn" disabled>Enter Memory Verse</button>
    <div id="world-debug" class="world-debug hidden"></div>

    <!-- Gumball / scene mover — only visible while Memory Verse is active -->
    <button type="button" id="gumball-btn" class="gumball-btn hidden">⊕ MOVE</button>
    <div id="gumball-overlay" class="gumball-overlay hidden">
      <div id="gumball-center"   class="gumball-center"></div>
      <div id="gumball-x-handle" class="gumball-handle gumball-x" data-axis="x"><span>X</span></div>
      <div id="gumball-z-handle" class="gumball-handle gumball-z" data-axis="z"><span>Z</span></div>
      <div id="gumball-label"    class="gumball-label"></div>
    </div>

    <!-- Keyboard navigation guide — small closable tab, expands on click -->
    <button type="button" id="nav-hint-tab" class="nav-hint-tab">?</button>
    <div id="nav-hint-panel" class="nav-hint-panel hidden">
      <button type="button" id="nav-hint-close" class="nav-hint-close" aria-label="Close">×</button>
      <div class="nav-hint-row"><span class="nk">W S</span> / <span class="nk">↑ ↓</span> walk</div>
      <div class="nav-hint-row"><span class="nk">A D</span> strafe</div>
      <div class="nav-hint-row"><span class="nk">← →</span> turn head</div>
      <div class="nav-hint-row"><span class="nk">Q E</span> up / down</div>
      <div class="nav-hint-row"><span class="nk">drag</span> look</div>
      <div class="nav-hint-row"><span class="nk">scroll</span> zoom</div>
      <div class="nav-hint-row"><span class="nk">click</span> reset / focus memory</div>
      <div class="nav-hint-row"><span class="nk">F</span> fullscreen</div>
    </div>

    <script type="module" src="/src/viewer.js"></script>
  </body>
</html>
