<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memo-Haus — Live Viewer</title>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="transition-overlay"></div>

    <div id="placeholder">
      <h1>Memo-Haus</h1>
      <p>From Archive To Participatory Experience</p>
      <p class="hint">Waiting for the first photo… scan the QR code to share one.</p>
    </div>

    <div id="caption" class="caption hidden">
      <span id="caption-name" class="caption-name"></span>
      <span id="caption-author" class="caption-author"></span>
    </div>

    <div id="connection" class="connection" title="Backend connection"></div>

    <script type="module" src="/src/viewer.js"></script>
  </body>
</html>
